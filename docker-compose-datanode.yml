version: "3"

services:
  datanode:
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.2.1-java8
    container_name: datanode
    restart: always
    ports:
      - 9864:9864
    volumes:
      - hadoop_datanode:/hadoop/dfs/data
    environment:
      - SERVICE_PRECONDITION=26.73.183.169:9870
      - CORE_CONF_fs_defaultFS=hdfs://26.73.183.169:9000
    env_file:
      - ./hadoop.env

  nodemanager:
    image: bde2020/hadoop-nodemanager:2.0.0-hadoop3.2.1-java8
    container_name: nodemanager
    restart: always
    environment:
      - SERVICE_PRECONDITION=26.73.183.169:9870 26.73.183.169:8088
      - CORE_CONF_fs_defaultFS=hdfs://26.73.183.169:9000
    env_file:
      - ./hadoop.env

volumes:
  hadoop_datanode:
